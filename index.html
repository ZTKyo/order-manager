<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>效果图订单管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 登录页 -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <h2 style="margin-bottom:6px;">📋 订单管理</h2>
            <div style="color:#6b7280;font-size:13px;margin-bottom:20px;">多端实时同步 · 效果图代画专用</div>

            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-input" id="auth-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="auth-password" placeholder="至少 6 位">
            </div>

            <div style="display:flex;gap:8px;margin-bottom:12px;">
                <button class="btn btn-primary" style="flex:1;" onclick="signIn()">登录</button>
                <button class="btn btn-secondary" style="flex:1;" onclick="signUp()">注册</button>
            </div>
            <button class="btn btn-ghost" style="width:100%;" onclick="signInAnon()">🙂 先不登录（仅本机使用）</button>

            <div id="auth-msg" style="color:#ef4444;font-size:13px;margin-top:12px;min-height:18px;"></div>

            <div style="margin-top:20px;padding-top:16px;border-top:1px solid #e5e7eb;font-size:12px;color:#9ca3af;text-align:center;">
                登录后 · 手机电脑数据实时同步
            </div>
        </div>
    </div>

    <!-- 主应用（登录后显示） -->
    <div class="app" id="app" style="display:none;">
        <header class="header">
            <h1 class="logo" onclick="navigate('dashboard')">📋 订单管理</h1>
            <nav class="nav">
                <a class="nav-item" data-nav="dashboard" onclick="navigate('dashboard')">仪表盘</a>
                <a class="nav-item" data-nav="orders" onclick="navigate('orders')">订单</a>
                <a class="nav-item" data-nav="stats" onclick="navigate('stats')">统计</a>
                <a class="nav-item" data-nav="settings" onclick="navigate('settings')">🔔 通知</a>
                <a class="nav-btn" onclick="navigate('new')">+ 新订单</a>
                <span id="user-info" class="user-info"></span>
                <a class="link" style="margin-left:8px;" onclick="signOut()">退出</a>
            </nav>
        </header>

        <main id="main" class="main"></main>

        <footer class="footer">
            <span id="data-info"></span>
            <a class="link" onclick="exportData()">导出</a>
            <a class="link" onclick="document.getElementById('import-file').click()">导入</a>
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
        </footer>
    </div>

    <div id="modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">✕</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Firebase SDK（生产环境，模块化已不再需要，仍保留 legacy namespaced API 以兼容单文件调用） -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script src="js/app.js"></script>
</body>
</html>
